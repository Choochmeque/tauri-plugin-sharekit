name: Build Demo

on:
  pull_request:
  push:
    branches: ['**']

jobs:
  # Build the example app on every desktop OS. Catches platform-specific
  # regressions.
  desktop:
    name: build-demo (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: awalsh128/cache-apt-pkgs-action@latest
        if: matrix.os == 'ubuntu-latest'
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          version: "1.0"

      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            examples/share-demo/src-tauri

      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Build plugin JS bundle
        run: |
          pnpm install
          pnpm build

      - name: Install demo deps
        working-directory: examples/share-demo
        run: pnpm install

      # `--no-bundle` skips creating .deb/.dmg/.msi installers — we only
      # care that the app compiles & links on each OS, not that bundlers
      # work. `--debug` skips release-mode codegen to keep CI fast.
      - name: Build demo
        working-directory: examples/share-demo
        run: pnpm tauri build --debug --no-bundle

  android:
    name: build-demo (android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install && pnpm build
      - working-directory: examples/share-demo
        run: pnpm install
      # `cargo-ndk` (used internally by `tauri android build`) needs
      # `NDK_HOME` / `ANDROID_NDK_HOME`; setup-android only sets
      # `ANDROID_NDK_LATEST_HOME`, so plumb it through.
      - working-directory: examples/share-demo
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        run: pnpm tauri android build --debug --apk --target aarch64

  ios:
    name: build-demo (ios)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install && pnpm build
      - working-directory: examples/share-demo
        run: pnpm install
      # iOS Simulator target skips Apple code signing.
      - working-directory: examples/share-demo
        run: pnpm tauri ios build --debug --target aarch64-sim
